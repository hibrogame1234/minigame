<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minigame Vòng Quay May Mắn</title>
    <link rel="stylesheet" href="style_vongquay.css">
</head>
<body>
    <div class="wheel-container">
        <nav class="game-nav">
            <a href="index.html" class="nav-item">🎲 Xúc Xắc</a>
            <a href="vongquay.html" class="nav-item active">🎡 Vòng Quay</a>
        </nav>

        <header>
            <h1>LALAB0Y - EVENT THÁNG</h1>
            <div class="event-tag">VÒNG QUAY MAY MẮN - 20H THỨ 7 CUỐI THÁNG</div>
            <img src="img/logoBang.png" onerror="this.style.display='none'">
        </header>

        <div class="input-section card-fancy">
            <input type="text" id="username" placeholder="Nhập tên Ingame chính xác để quay...">
        </div>

        <div class="main-layout">
            <div class="wheel-side">
                <div class="wheel-wrapper">
                    <div class="pointer"></div>
                    <canvas id="wheelCanvas" width="500" height="500"></canvas>
                </div>
                <button id="spin-btn">QUAY NGAY</button>
                <h2 id="result-text">Chúc bạn may mắn!</h2>
            </div>

            <div class="info-side">
                <div class="card-fancy">
                    <h3>🎁 PHẦN THƯỞNG</h3>
                    <ul id="prize-list-display">
                        <li>⭐ Vật phẩm giá trị cao</li>
                        <li>💎 Ngọc xanh / Vàng</li>
                        <li>📦 Rương vật phẩm</li>
                    </ul>
                </div>

                <div class="card-fancy history-section">
                    <div class="history-header">
                        <h3>🏆 LỊCH SỬ NHẬN THƯỞNG</h3>
                    </div>
                    <div class="table-container">
                        <table class="ranking-table">
                            <thead>
                                <tr>
                                    <th>Thời gian</th>
                                    <th>Nhân vật</th>
                                    <th>Vật phẩm</th>
                                </tr>
                            </thead>
                            <tbody id="history-body">
                                <tr><td colspan="3">Đang tải dữ liệu...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
        apiKey: "AIzaSyB7X2zIrQu8YvH1g9D3a1sLQA-rrzRCLfc",
        authDomain: "lalaboy-minigame.firebaseapp.com",
        databaseURL: "https://lalaboy-minigame-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "lalaboy-minigame",
        storageBucket: "lalaboy-minigame.firebasestorage.app",
        messagingSenderId: "295321122434",
        appId: "1:295321122434:web:a75965125b62ba8cb3669b",
        measurementId: "G-Q0K9H98P86"
        };


        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.db = db;
        window.dbRef = ref;
        window.dbPush = push;
        window.dbOnValue = onValue;
        window.dbSet = set;
    </script>
    <script type="module" src="script_vongquay.js"></script>
</body>
</html>
